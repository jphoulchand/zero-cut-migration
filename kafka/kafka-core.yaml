# =============================================================================
# Kafka Core: Kafka Brokers + KRaft Controllers with mTLS
# Confluent for Kubernetes v3.2.2 (Helm chart 0.1514.40)
# Confluent Platform 8.2.1
#
# Deploy this first to verify core cluster works before adding other components
#
# Prerequisites:
#   1. Confluent operator deployed (helm install confluent-operator)
#   2. CA secret created: kubectl create secret tls ca-pair-sslcerts
#   3. RBAC applied: kubectl apply -f kafka-rbac.yaml
#
# Features:
#   - KRaft mode (no ZooKeeper)
#   - mTLS with auto-generated certificates
#   - TLS 1.3 only
#   - 5 KRaft controllers (HA across 3 AZs)
#   - 12 Kafka brokers (HA across 3 AZs)
#   - Replication factor: 3, Min ISR: 2
#   - ARM64 spot instances
# =============================================================================

---
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  replicas: 5

  image:
    application: confluentinc/cp-server:8.2.1
    init: confluentinc/confluent-init-container:3.2.2

  dataVolumeCapacity: 30Gi
  storageClass:
    name: gp3

  podTemplate:
    serviceAccountName: kafka

    resources:
      requests:
        cpu: 200m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi

    tolerations:
    - key: "arch"
      operator: "Equal"
      value: "arm64"
      effect: "NoSchedule"

    affinity:
      podAntiAffinity:
        # Prefer spreading across zones, but allow 2 per zone for 5 replicas / 3 AZs
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - kraftcontroller
            topologyKey: topology.kubernetes.io/zone

  tls:
    autoGeneratedCerts: true

  configOverrides:
    server:
    - "ssl.endpoint.identification.algorithm=https"
    - "ssl.client.auth=required"
    - "ssl.protocol=TLSv1.3"
    - "ssl.enabled.protocols=TLSv1.3"

---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  replicas: 12

  image:
    application: docker.io/confluentinc/cp-server:8.2.1
    init: confluentinc/confluent-init-container:3.2.2

  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller

  dataVolumeCapacity: 50Gi
  storageClass:
    name: gp3

  # Enable JMX metrics (port 7203), Jolokia (port 7777), Prometheus (port 7778)
  metrics:
    authentication:
      type: mtls
    jolokia:
      accessControl:
        enabled: true
        secretRef: jmx-credentials
    prometheus:
      whitelist:
      - "kafka.server:*"
      - "kafka.network:*"
      - "kafka.controller:*"
      - "kafka.log:*"
      - "java.lang:*"

  podTemplate:
    serviceAccountName: kafka

    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 8Gi

    tolerations:
    - key: "arch"
      operator: "Equal"
      value: "arm64"
      effect: "NoSchedule"

    affinity:
      podAntiAffinity:
        # Prefer spreading across zones, but allow 4 per zone for 12 replicas / 3 AZs
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - kafka
            topologyKey: topology.kubernetes.io/zone

  tls:
    autoGeneratedCerts: true

  listeners:
    internal:
      authentication:
        type: mtls
        principalMappingRules:
        - "RULE:^CN=(.*?),OU=Engineering,O=Confluent,L=MountainView,ST=CA,C=US$/$1/"
        - "DEFAULT"
      tls:
        enabled: true

  configOverrides:
    server:
    # SSL/TLS Configuration
    - "ssl.endpoint.identification.algorithm=https"
    - "ssl.client.auth=required"
    - "ssl.protocol=TLSv1.3"
    - "ssl.enabled.protocols=TLSv1.3"

    # Replication & Durability
    - "default.replication.factor=3"
    - "min.insync.replicas=2"
    - "offsets.topic.replication.factor=3"
    - "transaction.state.log.replication.factor=3"
    - "transaction.state.log.min.isr=2"

    # Retention
    - "log.retention.hours=168"
    - "compression.type=producer"

    # Performance
    - "num.network.threads=8"
    - "num.io.threads=8"

  metricReporter:
    enabled: true
    bootstrapEndpoint: kafka.confluent.svc.cluster.local:9071
    authentication:
      type: mtls
    tls:
      enabled: true

  rackAssignment:
    nodeLabels:
    - topology.kubernetes.io/zone
