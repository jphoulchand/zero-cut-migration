# =============================================================================
# Kafka Combined Mode: 4 Nodes (Brokers + Controllers) with mTLS
# Confluent for Kubernetes v3.2.2 (Helm chart 0.1514.40)
# Confluent Platform 8.2.1
#
# Combined mode: Kafka brokers also act as KRaft controllers (no separate controller pods)
#
# Prerequisites:
#   1. Confluent operator deployed (helm install confluent-operator)
#   2. CA secret created: kubectl create secret tls ca-pair-sslcerts
#   3. RBAC applied: kubectl apply -f kafka-rbac.yaml
#
# Features:
#   - KRaft combined mode (brokers + controllers in same pods)
#   - mTLS with auto-generated certificates
#   - TLS 1.3 only
#   - 4 nodes total (efficient for development/testing)
#   - Default replication factor: 3, Min ISR: 2
#   - ARM64 spot instances
# =============================================================================

---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka-combined
  namespace: confluent
spec:
  replicas: 4

  image:
    application: docker.io/confluentinc/cp-server:8.2.1
    init: confluentinc/confluent-init-container:3.2.2

  # Combined mode: these nodes serve as both brokers and controllers
  # No separate KRaftController resource needed
  configOverrides:
    server:
    # KRaft Combined Mode Configuration
    - "process.roles=broker,controller"
    - "controller.quorum.voters=0@kafka-combined-0.kafka-combined.confluent.svc.cluster.local:9073,1@kafka-combined-1.kafka-combined.confluent.svc.cluster.local:9073,2@kafka-combined-2.kafka-combined.confluent.svc.cluster.local:9073,3@kafka-combined-3.kafka-combined.confluent.svc.cluster.local:9073"

    # SSL/TLS Configuration - mTLS for internal replication
    - "ssl.endpoint.identification.algorithm=https"
    - "ssl.client.auth=required"
    - "ssl.protocol=TLSv1.3"
    - "ssl.enabled.protocols=TLSv1.3"

    # Replication & Durability (appropriate for 4 nodes)
    - "default.replication.factor=3"
    - "min.insync.replicas=2"
    - "offsets.topic.replication.factor=3"
    - "transaction.state.log.replication.factor=3"
    - "transaction.state.log.min.isr=2"

    # Retention
    - "log.retention.hours=168"
    - "compression.type=producer"

    # Performance
    - "num.network.threads=8"
    - "num.io.threads=8"
    - "num.replica.fetchers=4"
    - "replica.fetch.max.bytes=10485760"
    - "replica.fetch.response.max.bytes=52428800"

  dataVolumeCapacity: 50Gi
  storageClass:
    name: gp3

  podTemplate:
    serviceAccountName: kafka

    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 8Gi

    tolerations:
    - key: "arch"
      operator: "Equal"
      value: "arm64"
      effect: "NoSchedule"

    affinity:
      podAntiAffinity:
        # Spread across zones (4 nodes across 3 AZs)
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - kafka
            topologyKey: topology.kubernetes.io/zone

  # mTLS configuration for internal communication
  tls:
    autoGeneratedCerts: true

  listeners:
    internal:
      authentication:
        type: mtls
        principalMappingRules:
        - "RULE:^CN=(.*?),OU=Engineering,O=Confluent,L=MountainView,ST=CA,C=US$/$1/"
        - "DEFAULT"
      tls:
        enabled: true

  metricReporter:
    enabled: true
    bootstrapEndpoint: kafka-combined.confluent.svc.cluster.local:9071
    authentication:
      type: mtls
    tls:
      enabled: true

  rackAssignment:
    nodeLabels:
    - topology.kubernetes.io/zone
