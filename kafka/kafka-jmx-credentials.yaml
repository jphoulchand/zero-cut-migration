# =============================================================================
# JMX Credentials Secret for Kafka Monitoring
# =============================================================================
# This secret contains JMX authentication credentials for remote monitoring.
#
# Ports exposed by CFK:
#   - 7203: JMX (remote JMX access)
#   - 7777: Jolokia (JMX over HTTP/REST)
#   - 7778: Prometheus JMX Exporter (Prometheus metrics)
#
# Deploy:
#   kubectl apply -f kafka-jmx-credentials.yaml
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: jmx-credentials
  namespace: confluent
type: Opaque
stringData:
  # JMX password file (permissions: 0600)
  # Format: <username> <password>
  jmxremote.password: |
    admin admin-secret
    monitorRole monitor-secret

  # JMX access control file (permissions: 0644)
  # Format: <username> <access-level>
  # access-level: readonly or readwrite
  jmxremote.access: |
    admin readwrite
    monitorRole readonly
