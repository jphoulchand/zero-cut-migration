# =============================================================================
# Kafka Auxiliary Services: Schema Registry + Kafka Connect
# Confluent for Kubernetes v3.2.2 (Helm chart 0.1514.40)
# Confluent Platform 8.2.1
#
# Deploy this AFTER kafka-core.yaml is fully running and verified
#
# Prerequisites:
#   1. KRaft controllers running (5/5 ready)
#   2. Kafka brokers running (12/12 ready)
#   3. Kafka cluster status: RUNNING
#   4. CA secret exists: ca-pair-sslcerts
#
# Verify Kafka core before deploying:
#   kubectl get kafka kafka -n confluent
#   # Expected: STATUS=RUNNING, READY=12
#
# Deployment:
#   kubectl apply -f kafka-auxiliary.yaml
#
# Features:
#   - Schema Registry: 3 replicas with mTLS
#   - Kafka Connect: 2 replicas with mTLS
#   - Auto-generated certificates
#   - TLS 1.3 encryption
# =============================================================================

---
apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: confluent
spec:
  replicas: 3

  image:
    application: confluentinc/cp-schema-registry:8.2.1
    init: confluentinc/confluent-init-container:3.2.2

  podTemplate:
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

    tolerations:
    - key: "arch"
      operator: "Equal"
      value: "arm64"
      effect: "NoSchedule"

  tls:
    autoGeneratedCerts: true

  dependencies:
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9071
      tls:
        enabled: true
      authentication:
        type: mtls

---
apiVersion: platform.confluent.io/v1beta1
kind: Connect
metadata:
  name: connect
  namespace: confluent
spec:
  replicas: 2

  image:
    application: confluentinc/cp-server-connect:8.2.1
    init: confluentinc/confluent-init-container:3.2.2

  podTemplate:
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    tolerations:
    - key: "arch"
      operator: "Equal"
      value: "arm64"
      effect: "NoSchedule"

  tls:
    autoGeneratedCerts: true

  dependencies:
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9071
      tls:
        enabled: true
      authentication:
        type: mtls

    schemaRegistry:
      url: https://schemaregistry.confluent.svc.cluster.local:8081
      tls:
        enabled: true
