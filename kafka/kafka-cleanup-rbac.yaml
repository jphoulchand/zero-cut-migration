---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-cleanup
  namespace: confluent

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kafka-cleanup
  namespace: confluent
rules:
# Read cleanup configuration from secret
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["kafka-cleanup-config"]
  verbs: ["get"]

# Delete Kafka and KRaftController CRDs
- apiGroups: ["platform.confluent.io"]
  resources: ["kafkas", "kraftcontrollers"]
  verbs: ["get", "list", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kafka-cleanup
  namespace: confluent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kafka-cleanup
subjects:
- kind: ServiceAccount
  name: kafka-cleanup
  namespace: confluent
